{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="d-flex justify-content-center" style="margin: 60px 0 0;">
    <div class="register-box card" style="width: 100%; max-width: 480px;">
        <h3 style="text-align: center; margin-bottom: 24px;">Đăng nhập</h3>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label>Email đăng nhập (Username)</label>
                <input type="text" name="username" placeholder="Nhập địa chỉ email của bạn" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" placeholder="Nhập mật khẩu" required>
            </div>

            <button type="submit" class="btn-register">Đăng nhập</button>
            
            <div style="margin-top: 15px; text-align: center;">
                <p>Chưa có tài khoản? <a href="{% url 'register' %}" style="color: #1a7f6b; font-weight: bold; text-decoration: none;">Đăng ký ngay</a></p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
