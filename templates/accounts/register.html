{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="d-flex justify-content-center" style="margin: 40px 0 0;">
    <div class="register-box card" style="width: 100%; max-width: 520px;">
        <h3 style="text-align: center; margin-bottom: 24px;"><i class="fas fa-user-plus"></i> Đăng ký tài khoản</h3>

        <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" name="fullname" value="{{ fullname|default:'' }}" placeholder="Nguyễn Văn A" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ email|default:'' }}" required>
            </div>
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="tel" name="phone" value="{{ phone|default:'' }}">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password1" id="password1" required>
            </div>
            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" name="password2" id="password2" placeholder="Nhập lại mật khẩu" required>
                <small id="password-error" style="color: #dc3545; display: none;">Mật khẩu xác nhận không khớp.</small>
            </div>
            <div class="form-group">
                <label>Bạn là:</label>
                <div class="radio-group">
                    <label><input type="radio" name="user_type" value="ungvien" {% if user_type != 'ntd' %}checked{% endif %}> Ứng viên</label>
                    <label><input type="radio" name="user_type" value="ntd" {% if user_type == 'ntd' %}checked{% endif %}> Nhà tuyển dụng</label>
                </div>
            </div>
            
            <div class="form-group" id="company-name-group" style="display: none;">
                <label>Tên công ty</label>
                <input type="text" name="company_name" id="company_name_input" value="{{ company_name|default:'' }}" placeholder="Nhập tên công ty của bạn">
            </div>

            <button type="submit" class="btn-register">Đăng ký ngay</button>
            
            <div style="margin-top: 15px; text-align: center;">
                <p>Đã có tài khoản? <a href="{% url 'login' %}" style="color: #1a7f6b; font-weight: bold; text-decoration: none;">Đăng nhập ngay</a></p>
            </div>
        </form>

        <script>
            document.addEventListener("DOMContentLoaded", function() {
                const radios = document.querySelectorAll('input[name="user_type"]');
                const companyGroup = document.getElementById('company-name-group');
                const companyInput = document.getElementById('company_name_input');

                const password1Input = document.getElementById('password1');
                const password2Input = document.getElementById('password2');
                const passwordError = document.getElementById('password-error');
                const form = document.querySelector('form');

                function updateCompanyField() {
                    const selectedRole = document.querySelector('input[name="user_type"]:checked').value;
                    if (selectedRole === 'ntd') {
                        companyGroup.style.display = 'block';
                        companyInput.required = true;
                    } else {
                        companyGroup.style.display = 'none';
                        companyInput.required = false;
                    }
                }

                function validatePasswords() {
                    if (password2Input.value && password1Input.value !== password2Input.value) {
                        passwordError.style.display = 'block';
                        password2Input.setCustomValidity("Invalid");
                    } else {
                        passwordError.style.display = 'none';
                        password2Input.setCustomValidity("");
                    }
                }

                radios.forEach(radio => {
                    radio.addEventListener('change', updateCompanyField);
                });

                password2Input.addEventListener('input', validatePasswords);
                password1Input.addEventListener('input', validatePasswords);

                form.addEventListener('submit', function(e) {
                    if (password1Input.value !== password2Input.value) {
                        e.preventDefault();
                        validatePasswords();
                    }
                });

                // Set initial state
                updateCompanyField();
            });
        </script>
    </div>
</div>
{% endblock %}
