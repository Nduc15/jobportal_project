{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="row-split" style="display: flex; gap: 32px; margin: 40px 0;">
    <div class="register-box card">
        <h3><i class="fas fa-user-plus"></i> Đăng ký tài khoản</h3>
        

        <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" name="fullname" placeholder="Nguyễn Văn A" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="tel" name="phone">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password1" required>
            </div>
            <div class="form-group">
                <label>Bạn là:</label>
                <div class="radio-group">
                    <label><input type="radio" name="user_type" value="ungvien" checked> Ứng viên</label>
                    <label><input type="radio" name="user_type" value="ntd"> Nhà tuyển dụng</label>
                </div>
            </div>
            
            <div class="form-group" id="company-name-group" style="display: none;">
                <label>Tên công ty</label>
                <input type="text" name="company_name" id="company_name_input" placeholder="Nhập tên công ty của bạn">
            </div>

            <button type="submit" class="btn-register">Đăng ký ngay</button>
        </form>

        <script>
            document.addEventListener("DOMContentLoaded", function() {
                const radios = document.querySelectorAll('input[name="user_type"]');
                const companyGroup = document.getElementById('company-name-group');
                const companyInput = document.getElementById('company_name_input');

                function updateCompanyField() {
                    const selectedRole = document.querySelector('input[name="user_type"]:checked').value;
                    if (selectedRole === 'ntd') {
                        companyGroup.style.display = 'block';
                        companyInput.required = true;
                    } else {
                        companyGroup.style.display = 'none';
                        companyInput.required = false;
                    }
                }

                radios.forEach(radio => {
                    radio.addEventListener('change', updateCompanyField);
                });

                // Set initial state
                updateCompanyField();
            });
        </script>
    </div>
    <div class="info-box card">
        <h3>Lợi thế nổi bật</h3>
        <ul>
            <li><i class="fas fa-check-circle" style="color:#1a7f6b;"></i> Hệ sinh thái nhân sự tiên phong</li>
            <li><i class="fas fa-check-circle" style="color:#1a7f6b;"></i> Kết nối ứng viên IT & tài chính</li>
        </ul>
    </div>
</div>
{% endblock %}
